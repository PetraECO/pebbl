<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pebbl</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ─── Theme tokens: ONE set of rules, two themes ─── */
:root{
  --page:#101416; --frame:#131a1c; --card:#182124; --bd:#223034;
  --chipbg:#1c272a; --chipbd:#2b3c40; --chiptx:#9fc2bd;
  --tx:#e4ebe9; --sub:#7c8b89; --ft:#5f6a68;
  --ac:#7fa6a1; --acx:#131a1c; --trk:#25333a;
  --aw:#89a7c2; --as:#9a93bd; --acr:#b790a0;
}
body.light{
  --page:#e7e4dc; --frame:#f4f1eb; --card:#fdfcf9; --bd:#e3ded4;
  --chipbg:#e9e4da; --chipbd:#ddd6c9; --chiptx:#6f6a5e;
  --tx:#2c2a26; --sub:#8a8478; --ft:#a29b8d;
  --ac:#4d5964; --acx:#f4f1eb; --trk:#eae5da;
  --aw:#7a93ab; --as:#8f83ad; --acr:#ad7f8d;
}
*{box-sizing:border-box}
body{margin:0;background:var(--page);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--tx);transition:background .3s}
a{color:var(--ac);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit;background:var(--frame);border:1px solid var(--bd);border-radius:10px;color:var(--tx);padding:11px 13px;font-size:13.5px;outline:none;width:100%}
.app{max-width:410px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--frame);border-left:1px solid var(--bd);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;letter-spacing:-.2px}
.pebble{width:22px;height:18px;background:var(--ac);border-radius:50% 50% 48% 52%/60% 55% 45% 40%;display:inline-block}
.chip{background:var(--chipbg);border:1px solid var(--chipbd);color:var(--chiptx);font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px}
.screen{flex:1;padding:0 24px 20px;display:flex;flex-direction:column}
.big-btn{background:var(--ac);color:var(--acx);border:none;border-radius:18px;padding:18px;text-align:center;font-weight:800;font-size:16.5px;letter-spacing:-.2px;width:100%}
.big-btn:active{transform:scale(.98)}
.divider{display:flex;align-items:center;gap:10px;margin:26px 0 14px}
.divider span{color:var(--ft);font-size:10.5px;font-weight:700;letter-spacing:1px;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.dur-row{display:flex;gap:8px;margin-bottom:12px}
.dur{flex:1;padding:9px 0;border-radius:10px;font-weight:700;font-size:12.5px;border:1px solid var(--bd);background:var(--card);color:var(--sub)}
.dur.on{border-color:var(--ac);background:var(--ac);color:var(--acx)}
.area-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px 15px;cursor:pointer;width:100%;text-align:left}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bar{width:52px;height:3px;background:var(--trk);border-radius:2px;overflow:hidden;flex-shrink:0}
.bar i{display:block;height:100%}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:18px}
.lbl{color:var(--ft);font-size:10.5px;font-weight:700;letter-spacing:1px}
.nav{display:flex;gap:6px;padding:12px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--bd)}
.nav button{flex:1;padding:10px 0;border-radius:12px;font-weight:800;font-size:12.5px;border:none;background:transparent;color:var(--ft)}
.nav button.on{background:var(--chipbg);color:var(--tx)}
.ring-wrap{position:relative;width:230px;height:230px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap .inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.time{font-size:50px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.save-status{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--chipbg);border:1px solid var(--chipbd);color:var(--chiptx);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none}
.save-status.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="save-status" id="saveStatus"></div>
<script>
'use strict';
/* ══════════════════════════════════════════════════════
   1. CONFIG — put YOUR values here
   ══════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://nqgawtyzynggdouanzrr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_au3b9IbvnK7ECv2PJxGxMw_xGNJaTs8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ══════════════════════════════════════════════════════
   2. SECURITY: escape ALL user text before innerHTML.
   Fixes the XSS hole in the old renderers.
   ══════════════════════════════════════════════════════ */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const NUDGES = ["Just the first pebble. That's all.","You don't have to feel ready to start.","Pick one thing. Just one.","Small start. Real progress.","The hardest step is showing up. You're already here.","Momentum starts with a single move."];
const KUDOS = ["That's the hardest part done.","Consistency compounds.","One pebble closer.","Future you is grateful.","You showed up. That's the win."];
const AREA_COLORS = ['var(--aw)','var(--as)','var(--acr)'];

/* ══════════════════════════════════════════════════════
   3. STATE — server (Supabase) is the source of truth.
   localStorage holds ONLY: the running timer + a read-only
   snapshot for instant paint. It is never written back to
   the server. This fixes "edits don't stay".
   ══════════════════════════════════════════════════════ */
const state = {
  user: null,
  settings: null,          // {name, theme, areas:[{name,color,goal}]}  ← from user_settings
  sessions: [],            // recent sessions ← from sessions table
  loaded: false,           // true once server data has arrived; writes blocked until then
  tab: 'focus', phase: 'pre', dur: 25,
  timer: null,             // {area, endAt, total, remaining, running}
  celeb: null, note: ''
};
const DEFAULT_SETTINGS = { name:'', theme:'dark', areas:[
  {name:'Work', goal:10},{name:'Study', goal:16},{name:'Creative', goal:5}]};

/* ─── save indicator ─── */
let statusTimer;
function showStatus(msg, sticky){
  const el = document.getElementById('saveStatus');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(statusTimer);
  if(!sticky) statusTimer = setTimeout(()=>el.classList.remove('show'), 1500);
}

/* ══════════════════════════════════════════════════════
   4. PERSISTENCE
   ══════════════════════════════════════════════════════ */
async function loadUserData(){
  // Read server FIRST. Never render cached data as editable
  // until this completes (state.loaded gate).
  const [{data: settings, error: e1}, {data: sessions, error: e2}] = await Promise.all([
    sb.from('user_settings').select('*').eq('user_id', state.user.id).maybeSingle(),
    sb.from('sessions').select('*').eq('user_id', state.user.id)
      .order('created_at', {ascending:false}).limit(200)
  ]);
  if(e1 || e2){ showStatus('offline — retrying', true); setTimeout(loadUserData, 4000); return; }
  if(settings){
    state.settings = { name: settings.name ?? '', theme: settings.theme ?? 'dark', areas: settings.areas ?? DEFAULT_SETTINGS.areas };
  } else {
    state.settings = structuredClone(DEFAULT_SETTINGS);
    // upsert so first save can't race a second insert
    await sb.from('user_settings').upsert({ user_id: state.user.id, ...state.settings });
  }
  state.sessions = sessions ?? [];
  state.loaded = true;
  localStorage.setItem('pebbl_snapshot', JSON.stringify({settings: state.settings})); // read-only snapshot
  applyTheme(); render();
}

// Debounced settings save — the ONLY writer of user_settings.
let saveT;
function saveSettings(){
  if(!state.loaded) return;              // never write before first load (this was wiping edits)
  clearTimeout(saveT);
  showStatus('saving…', true);
  saveT = setTimeout(async ()=>{
    const {error} = await sb.from('user_settings')
      .upsert({ user_id: state.user.id, ...state.settings });
    if(error){ showStatus('retrying…', true); setTimeout(saveSettings, 3000); }
    else {
      showStatus('saved');
      localStorage.setItem('pebbl_snapshot', JSON.stringify({settings: state.settings}));
    }
  }, 600);
}

async function saveSession(area, minutes, task){
  const row = { user_id: state.user.id, area, minutes, task: task || null };
  const {data, error} = await sb.from('sessions').insert(row).select().single();
  if(error){
    // queue & retry so a flaky connection never loses a pebble
    const q = JSON.parse(localStorage.getItem('pebbl_queue')||'[]'); q.push(row);
    localStorage.setItem('pebbl_queue', JSON.stringify(q));
    showStatus('will sync later'); 
    state.sessions.unshift({...row, created_at:new Date().toISOString()});
  } else state.sessions.unshift(data);
}
async function flushQueue(){
  const q = JSON.parse(localStorage.getItem('pebbl_queue')||'[]');
  if(!q.length || !state.user) return;
  const {error} = await sb.from('sessions').insert(q.map(r=>({...r, user_id: state.user.id})));
  if(!error){ localStorage.removeItem('pebbl_queue'); showStatus('synced'); loadUserData(); }
}

/* ─── running timer survives refresh ─── */
function persistTimer(){
  if(state.timer) localStorage.setItem('pebbl_timer', JSON.stringify(state.timer));
  else localStorage.removeItem('pebbl_timer');
}
function restoreTimer(){
  try{
    const t = JSON.parse(localStorage.getItem('pebbl_timer'));
    if(!t) return;
    if(t.running && t.endAt <= Date.now()){ // finished while away
      state.timer = t; finishSession(); return;
    }
    state.timer = t; state.phase = 'active';
  }catch(e){}
}

/* ══════════════════════════════════════════════════════
   5. CROSS-DEVICE SYNC — realtime + refetch on focus
   ══════════════════════════════════════════════════════ */
function subscribeRealtime(){
  sb.channel('pebbl-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'user_settings', filter:`user_id=eq.${state.user.id}`},
      payload => { if(payload.new){ state.settings = {name:payload.new.name??'', theme:payload.new.theme??'dark', areas:payload.new.areas??state.settings.areas}; applyTheme(); render(); } })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'sessions', filter:`user_id=eq.${state.user.id}`},
      payload => { if(!state.sessions.some(s=>s.id===payload.new.id)){ state.sessions.unshift(payload.new); render(); } })
    .subscribe();
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && state.user){ loadUserData(); flushQueue(); tick(); }
});
window.addEventListener('online', flushQueue);

/* ══════════════════════════════════════════════════════
   6. TIMER — always derived from endAt, never from ticks
   ══════════════════════════════════════════════════════ */
function startSession(area, mins){
  const total = mins*60;
  state.timer = { area, total, remaining: total, endAt: Date.now()+total*1000, running: true };
  state.phase = 'active'; state.note='';
  persistTimer(); render();
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}
function tick(){
  const t = state.timer;
  if(!t || !t.running) return;
  t.remaining = Math.max(0, Math.round((t.endAt - Date.now())/1000));
  if(t.remaining <= 0){ finishSession(); return; }
  if(state.phase==='active' && state.tab==='focus') updateTimerDom();
}
setInterval(tick, 500);
function finishSession(){
  const t = state.timer;
  const mins = Math.max(1, Math.round((t.total - Math.max(0, Math.round((t.endAt-Date.now())/1000)))/60));
  state.celeb = { area: t.area, mins: Math.min(mins, Math.round(t.total/60)) };
  state.timer = null; persistTimer();
  state.phase = 'celeb';
  if('Notification' in window && Notification.permission==='granted')
    new Notification('Pebble dropped 🎉', {body:`${state.celeb.mins} minutes of ${state.celeb.area||'focus'}. Nice.`});
  render();
}

/* ══════════════════════════════════════════════════════
   7. DERIVED DATA
   ══════════════════════════════════════════════════════ */
function weekStart(){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d; }
function weekSessions(){ const ws=weekStart(); return state.sessions.filter(s=>new Date(s.created_at)>=ws); }
function areaDone(name){ return weekSessions().filter(s=>s.area===name).reduce((a,s)=>a+s.minutes,0)/60; }
function streak(){
  const days = new Set(state.sessions.map(s=>new Date(s.created_at).toDateString()));
  let n=0; const d=new Date();
  if(!days.has(d.toDateString())) d.setDate(d.getDate()-1); // today doesn't break it yet
  while(days.has(d.toDateString())){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function timeAgo(iso){
  const m = Math.round((Date.now()-new Date(iso))/60000);
  if(m<60) return 'just now'; if(m<1440) return 'today';
  const dd = Math.floor(m/1440); return dd===1?'yesterday':dd+' days ago';
}

/* ══════════════════════════════════════════════════════
   8. RENDER — user text ALWAYS goes through esc();
   events bound with addEventListener, never inline onclick
   with interpolated strings.
   ══════════════════════════════════════════════════════ */
const app = document.getElementById('app');
function applyTheme(){ document.body.classList.toggle('light', state.settings?.theme==='light'); }

function render(){
  if(!state.user){ renderAuth(); return; }
  if(!state.loaded){ app.innerHTML = header()+'<div class="screen" style="justify-content:center;align-items:center"><span class="pebble" style="width:36px;height:30px"></span></div>'; return; }
  let body='';
  if(state.tab==='focus') body = state.phase==='active'?viewActive():state.phase==='celeb'?viewCeleb():viewPre();
  else if(state.tab==='ripples') body = viewRipples();
  else body = viewYou();
  app.innerHTML = header()+body+navBar();
  bindEvents();
}
function header(){
  const n = streak();
  return `<div class="hdr"><div class="logo"><span class="pebble"></span>Pebbl</div>
    <span class="chip">${n>0?n+'-day ripple':'drop your first pebble'}</span></div>`;
}
function navBar(){
  return `<div class="nav">${['focus','ripples','you'].map(t=>
    `<button data-tab="${t}" class="${state.tab===t?'on':''}">${t==='you'?'You':t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div>`;
}
function areaRows(){
  return state.settings.areas.map((a,i)=>{
    const done = areaDone(a.name), goal = a.goal||1, pct = Math.min(100, Math.round(done/goal*100));
    return `<button class="area-row" data-start-area="${i}">
      <span class="dot" style="background:${AREA_COLORS[i%3]}"></span>
      <span style="font-size:13.5px;font-weight:700;flex:1">${esc(a.name)}</span>
      <span style="color:var(--sub);font-size:11.5px;font-weight:600">${done>0?done.toFixed(1):'—'} / ${goal}h</span>
      <span class="bar"><i style="width:${pct}%;background:${AREA_COLORS[i%3]}"></i></span></button>`;
  }).join('');
}
function viewPre(){
  const h = new Date().getHours(), part = h<12?'morning':h<17?'afternoon':'evening';
  const first = state.settings.name ? ', '+esc(state.settings.name.split(' ')[0]) : '';
  return `<div class="screen" style="padding-top:28px">
    <div style="font-size:23px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px">Good ${part}${first}.</div>
    <div style="color:var(--sub);font-size:14px;margin-bottom:26px">${NUDGES[Math.floor(Date.now()/8000)%NUDGES.length]}</div>
    <button class="big-btn" data-drop>Drop a pebble</button>
    <div style="color:var(--ft);font-size:11.5px;text-align:center;margin-top:9px">5 minutes starts the moment you tap</div>
    <div class="divider"><span>OR FOCUS SOMEWHERE</span></div>
    <div class="dur-row">${[15,25,45].map(m=>`<button class="dur ${state.dur===m?'on':''}" data-dur="${m}">${m} min</button>`).join('')}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${areaRows()}</div>
    <div style="color:var(--ft);font-size:11px;text-align:center;margin-top:12px">tap an area to start — no form, no setup</div></div>`;
}
function viewActive(){
  const t = state.timer;
  return `<div class="screen" style="align-items:center;justify-content:center;position:relative;overflow:hidden">
    <span style="position:absolute;width:440px;height:440px;border:1px solid var(--ac);opacity:.09;border-radius:50%"></span>
    <span style="position:absolute;width:580px;height:580px;border:1px solid var(--ac);opacity:.05;border-radius:50%"></span>
    <span class="chip" style="margin-bottom:34px;position:relative">${esc(t.area||'Free focus')}</span>
    <div class="ring-wrap" style="margin-bottom:34px">
      <svg width="230" height="230" viewBox="0 0 230 230">
        <circle cx="115" cy="115" r="106" fill="none" stroke="var(--trk)" stroke-width="5"/>
        <circle id="ringFg" cx="115" cy="115" r="106" fill="none" stroke="var(--ac)" stroke-width="5" stroke-linecap="round" stroke-dasharray="666" style="transition:stroke-dashoffset .5s linear"/>
      </svg>
      <div class="inner"><span class="time" id="timeStr"></span>
        <span style="color:var(--sub);font-size:12px;font-weight:600;margin-top:4px" id="ofStr"></span></div></div>
    <button data-pause style="background:var(--chipbg);border:1px solid var(--chipbd);color:var(--tx);border-radius:14px;padding:13px 48px;font-weight:800;font-size:14.5px;position:relative">${t.running?'Pause':'Resume'}</button>
    <button data-end style="background:none;border:none;color:var(--ft);font-size:12px;font-weight:600;margin-top:16px;position:relative">end &amp; save</button></div>`;
}
function updateTimerDom(){
  const t = state.timer; if(!t) return;
  const el = document.getElementById('timeStr'); if(!el) return;
  el.textContent = String(Math.floor(t.remaining/60)).padStart(2,'0')+':'+String(t.remaining%60).padStart(2,'0');
  document.getElementById('ofStr').textContent = 'of '+Math.round(t.total/60)+' min'+(t.running?'':' · paused');
  document.getElementById('ringFg').style.strokeDashoffset = 666*(1-(t.remaining/t.total));
}
function viewCeleb(){
  const c = state.celeb;
  return `<div class="screen" style="align-items:center;justify-content:center;text-align:center">
    <span class="pebble" style="width:44px;height:36px;margin-bottom:22px"></span>
    <div style="font-size:24px;font-weight:800;margin-bottom:6px">Pebble dropped.</div>
    <div style="color:var(--sub);font-size:14px;margin-bottom:26px">${KUDOS[Math.floor(Math.random()*KUDOS.length)]}</div>
    <div style="display:flex;gap:10px;margin-bottom:26px">
      <div class="card" style="padding:12px 22px"><div style="font-size:20px;font-weight:800">${c.mins}</div><div class="lbl" style="margin-top:2px">MINUTES</div></div>
      <div class="card" style="padding:12px 22px"><div style="font-size:20px;font-weight:800">${esc(c.area||'Free')}</div><div class="lbl" style="margin-top:2px">AREA</div></div></div>
    <textarea id="celebNote" placeholder="What did you get done? (optional)" style="min-height:70px;resize:none;margin-bottom:18px">${esc(state.note)}</textarea>
    <button class="big-btn" data-celeb-done style="max-width:220px;border-radius:14px;padding:14px">Done</button></div>`;
}
function viewRipples(){
  const wk = weekSessions(), hrs = (wk.reduce((a,s)=>a+s.minutes,0)/60).toFixed(1);
  const bars = state.settings.areas.map((a,i)=>{
    const done = areaDone(a.name), pct = Math.min(100, Math.round(done/(a.goal||1)*100));
    return `<div><div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12.5px;font-weight:700">${esc(a.name)}</span>
      <span style="color:var(--sub);font-size:11.5px;font-weight:600">${done>0?done.toFixed(1):'—'} / ${a.goal}h</span></div>
      <div style="height:5px;background:var(--trk);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${AREA_COLORS[i%3]}"></div></div></div>`;
  }).join('');
  const log = state.sessions.slice(0,12).map(s=>{
    const i = state.settings.areas.findIndex(a=>a.name===s.area);
    return `<div style="display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:11px 14px">
      <span class="dot" style="background:${i>=0?AREA_COLORS[i%3]:'var(--ac)'};width:8px;height:8px"></span>
      <span style="font-size:12.5px;font-weight:700;min-width:62px">${esc(s.area||'Free')}</span>
      <span style="color:var(--sub);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.task||'—')}</span>
      <span style="color:var(--ft);font-size:11px;font-weight:600;white-space:nowrap">${s.minutes}m · ${timeAgo(s.created_at)}</span></div>`;
  }).join('') || '<div style="color:var(--ft);font-size:12.5px;text-align:center;padding:20px 0">No pebbles yet. The first one is the hardest — and the smallest.</div>';
  return `<div class="screen" style="padding-top:26px">
    <div style="font-size:20px;font-weight:800;margin-bottom:18px">Ripples</div>
    <div style="display:flex;gap:8px;margin-bottom:26px">
      <div class="card" style="flex:1;text-align:center;padding:14px 10px"><div style="font-size:18px;font-weight:800">${hrs}h</div><div class="lbl" style="margin-top:3px;font-size:10px">THIS WEEK</div></div>
      <div class="card" style="flex:1;text-align:center;padding:14px 10px"><div style="font-size:18px;font-weight:800">${wk.length}</div><div class="lbl" style="margin-top:3px;font-size:10px">PEBBLES</div></div>
      <div class="card" style="flex:1;text-align:center;padding:14px 10px"><div style="font-size:18px;font-weight:800;color:var(--ac)">${streak()}</div><div class="lbl" style="margin-top:3px;font-size:10px">DAY RIPPLE</div></div></div>
    <div class="lbl" style="margin-bottom:12px">THIS WEEK BY AREA</div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px">${bars}</div>
    <div class="lbl" style="margin-bottom:12px">RECENT PEBBLES</div>
    <div style="display:flex;flex-direction:column;gap:8px">${log}</div></div>`;
}
function viewYou(){
  const goals = state.settings.areas.map((a,i)=>`
    <div style="display:flex;align-items:center;gap:11px">
      <span class="dot" style="background:${AREA_COLORS[i%3]};width:8px;height:8px"></span>
      <input data-area-name="${i}" value="${esc(a.name)}" style="flex:1;padding:7px 9px;font-size:13px;font-weight:700">
      <input data-area-goal="${i}" type="number" min="1" value="${a.goal}" style="width:58px;padding:7px 9px;font-size:13px;text-align:right">
      <span style="color:var(--ft);font-size:12px;font-weight:600">h / wk</span></div>`).join('');
  return `<div class="screen" style="padding-top:26px">
    <div style="font-size:20px;font-weight:800;margin-bottom:18px">You</div>
    <div class="card" style="margin-bottom:14px"><div class="lbl" style="margin-bottom:10px">NAME</div>
      <input id="nameInput" value="${esc(state.settings.name)}" placeholder="Your name"></div>
    <div class="card" style="margin-bottom:14px"><div class="lbl" style="margin-bottom:10px">APPEARANCE</div>
      <div style="display:flex;gap:8px">
        <button class="dur ${state.settings.theme!=='light'?'on':''}" data-theme="dark">River (dark)</button>
        <button class="dur ${state.settings.theme==='light'?'on':''}" data-theme="light">Paper (light)</button></div></div>
    <div class="card" style="margin-bottom:14px"><div class="lbl" style="margin-bottom:12px">AREAS &amp; WEEKLY GOALS</div>
      <div style="display:flex;flex-direction:column;gap:10px">${goals}</div>
      <div style="color:var(--ft);font-size:11px;margin-top:12px">Changes save as you type — no save button.</div></div>
    <button data-signout style="background:none;border:1px solid var(--bd);color:var(--sub);border-radius:12px;padding:11px;font-weight:700;font-size:12.5px;width:100%">Sign out</button></div>`;
}
function renderAuth(){
  app.innerHTML = `<div class="screen" style="justify-content:center;padding:24px">
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:30px">
      <span class="pebble" style="width:44px;height:36px;margin-bottom:14px"></span>
      <div style="font-size:24px;font-weight:800">Pebbl</div>
      <div style="color:var(--sub);font-size:13.5px;margin-top:4px">Built for the first pebble.</div></div>
    <input id="authEmail" type="email" placeholder="you@email.com" style="margin-bottom:10px">
    <button class="big-btn" data-magic style="border-radius:14px;padding:14px;font-size:14.5px">Send me a sign-in link</button>
    <div id="authMsg" style="color:var(--sub);font-size:12px;text-align:center;margin-top:12px"></div></div>`;
  app.querySelector('[data-magic]').addEventListener('click', async ()=>{
    const email = document.getElementById('authEmail').value.trim();
    if(!email) return;
    const {error} = await sb.auth.signInWithOtp({email});
    document.getElementById('authMsg').textContent = error ? error.message : 'Check your email for the link.';
  });
}

/* ─── event binding (delegation-free, rebound per render) ─── */
function bindEvents(){
  app.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click', ()=>{ state.tab=b.dataset.tab; render(); }));
  const q = (sel, fn) => { const el = app.querySelector(sel); if(el) fn(el); };
  q('[data-drop]', el=>el.addEventListener('click', ()=>startSession(null, 5)));
  app.querySelectorAll('[data-dur]').forEach(b=>b.addEventListener('click', ()=>{ state.dur=+b.dataset.dur; render(); }));
  app.querySelectorAll('[data-start-area]').forEach(b=>b.addEventListener('click', ()=>{
    startSession(state.settings.areas[+b.dataset.startArea].name, state.dur); }));
  q('[data-pause]', el=>el.addEventListener('click', ()=>{
    const t = state.timer;
    if(t.running){ t.running=false; t.remaining=Math.max(0,Math.round((t.endAt-Date.now())/1000)); }
    else { t.running=true; t.endAt=Date.now()+t.remaining*1000; }
    persistTimer(); render(); updateTimerDom(); }));
  q('[data-end]', el=>el.addEventListener('click', finishSession));
  q('#celebNote', el=>el.addEventListener('input', ()=>{ state.note = el.value; }));
  q('[data-celeb-done]', el=>el.addEventListener('click', async ()=>{
    const c = state.celeb;
    await saveSession(c.area, c.mins, state.note.trim());
    state.celeb=null; state.note=''; state.phase='pre'; render(); }));
  q('#nameInput', el=>el.addEventListener('input', ()=>{ state.settings.name = el.value; saveSettings(); }));
  app.querySelectorAll('[data-theme]').forEach(b=>b.addEventListener('click', ()=>{
    state.settings.theme = b.dataset.theme; applyTheme(); saveSettings(); render(); }));
  app.querySelectorAll('[data-area-name]').forEach(el=>el.addEventListener('input', ()=>{
    state.settings.areas[+el.dataset.areaName].name = el.value; saveSettings(); }));
  app.querySelectorAll('[data-area-goal]').forEach(el=>el.addEventListener('input', ()=>{
    state.settings.areas[+el.dataset.areaGoal].goal = Math.max(1, parseInt(el.value)||1); saveSettings(); }));
  q('[data-signout]', el=>el.addEventListener('click', async ()=>{ await sb.auth.signOut(); }));
  if(state.phase==='active') updateTimerDom();
}

/* ══════════════════════════════════════════════════════
   9. BOOT
   ══════════════════════════════════════════════════════ */
(async function init(){
  // instant paint from snapshot while auth resolves
  try{ const snap = JSON.parse(localStorage.getItem('pebbl_snapshot')); if(snap?.settings){ state.settings = snap.settings; applyTheme(); } }catch(e){}
  sb.auth.onAuthStateChange((_evt, session)=>{
    const was = state.user?.id;
    state.user = session?.user ?? null;
    if(state.user && state.user.id !== was){
      state.loaded = false; render();
      restoreTimer(); loadUserData(); subscribeRealtime(); flushQueue();
    } else if(!state.user){ state.loaded=false; render(); }
  });
  const {data:{session}} = await sb.auth.getSession();
  if(!session) render();
})();
</script>
</body>
</html>
